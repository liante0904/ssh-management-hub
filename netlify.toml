[build]
  command = "npm run build"
  publish = "dist"

# API → management-hub 백엔드
[[redirects]]
  from = "/api/*"
  to = "https://ssh-oci.duckdns.org/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "https://ssh-oci.duckdns.org/admin/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
